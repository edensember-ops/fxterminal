<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#040d14">
<meta name="apple-mobile-web-app-title" content="FX Terminal">
<title>FX Terminal</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#040d14;--panel:#070f18;--panel2:#0a1520;
  --border:#0d2135;--border2:#112540;
  --accent:#00d4ff;--accent2:#00ff9d;--accent3:#ff6b35;--yellow:#ffd700;
  --red:#ff3a5e;--green:#00ff9d;
  --text:#b8d4e8;--dim:#4a6a80;--bright:#e8f4ff;
  --mono:'Consolas','Courier New',monospace;
  --ui:'Segoe UI','Arial',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);overflow:hidden;overscroll-behavior:none;}

/* TOP BAR */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:calc(52px + var(--safe-top));
  padding-top:var(--safe-top);
  background:linear-gradient(180deg,#020810,#040d14);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding-left:14px;padding-right:14px;gap:10px;
  z-index:100;
}
.logo{font-family:var(--mono);font-size:16px;font-weight:900;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px var(--accent);}
.logo span{color:var(--accent2);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1s infinite;flex-shrink:0;}
.conn-badge{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:2px;background:rgba(0,255,157,0.1);border:1px solid rgba(0,255,157,0.3);color:var(--green);letter-spacing:1px;white-space:nowrap;}
.clock{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:1px;white-space:nowrap;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* TICKER */
.ticker-bar{
  position:fixed;top:calc(52px + var(--safe-top));left:0;right:0;
  height:26px;background:#020810;border-bottom:1px solid var(--border);
  overflow:hidden;z-index:99;
}
.ticker-track{display:flex;width:max-content;animation:scroll 50s linear infinite;height:100%;align-items:center;}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}
.t-item{display:flex;align-items:center;gap:5px;padding:0 14px;border-right:1px solid var(--border);font-family:var(--mono);font-size:10px;white-space:nowrap;height:100%;}
.t-pair{color:var(--bright);font-weight:bold;}
.t-price{color:var(--accent);}
.up{color:var(--green)}.down{color:var(--red)}

/* NAV TABS */
.nav{
  position:fixed;top:calc(78px + var(--safe-top));left:0;right:0;
  display:flex;background:#020810;border-bottom:1px solid var(--border2);
  z-index:98;overflow-x:auto;scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{
  flex:0 0 auto;padding:9px 14px;
  font-family:var(--mono);font-size:9px;letter-spacing:1px;
  color:var(--dim);border:none;background:transparent;cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;
}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,212,255,0.05);}

/* CONTENT */
.content{
  position:fixed;
  top:calc(118px + var(--safe-top));
  left:0;right:0;
  bottom:calc(0px + var(--safe-bottom));
  overflow:hidden;
}
.tab{display:none;height:100%;overflow-y:auto;padding-bottom:20px;overscroll-behavior:contain;}
.tab.active{display:block;}
.tab::-webkit-scrollbar{width:3px;}
.tab::-webkit-scrollbar-thumb{background:var(--border2);}

/* SECTION HEADER */
.sh{
  padding:9px 14px;font-family:var(--mono);font-size:9px;
  color:var(--accent);letter-spacing:3px;
  border-bottom:1px solid var(--border2);background:rgba(0,0,0,0.3);
  position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px;
}
.sh-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2);animation:blink 2s infinite;}

/* QUOTES */
.cat-lbl{padding:5px 14px;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:2px;background:rgba(0,0,0,0.25);border-bottom:1px solid var(--border);}
.qrow{display:grid;grid-template-columns:1fr auto;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(13,33,53,0.6);}
.qrow:active{background:rgba(0,212,255,0.06);}
.q-pair{font-family:var(--mono);font-size:15px;color:var(--bright);font-weight:bold;letter-spacing:1px;}
.q-sub{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:2px;}
.q-price{font-family:var(--mono);font-size:16px;color:var(--accent);text-align:right;letter-spacing:1px;}
.q-chg{font-family:var(--mono);font-size:10px;text-align:right;margin-top:2px;}
@keyframes fu{0%{background:rgba(0,255,157,0.18)}100%{background:transparent}}
@keyframes fd{0%{background:rgba(255,58,94,0.18)}100%{background:transparent}}
.fu{animation:fu 0.7s ease;}.fd{animation:fd 0.7s ease;}

/* NEWS */
.filter-bar{display:flex;gap:6px;padding:9px 14px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--panel);scrollbar-width:none;align-items:center;}
.filter-bar::-webkit-scrollbar{display:none;}
.fp{padding:5px 12px;border-radius:20px;font-family:var(--mono);font-size:10px;border:1px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.fp.active{background:rgba(0,212,255,0.12);border-color:var(--accent);color:var(--accent);}
.live-b{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--green);white-space:nowrap;}
.ni{padding:13px 14px;border-bottom:1px solid rgba(13,33,53,0.6);animation:fadeIn 0.4s ease;}
.ni:active{background:rgba(0,212,255,0.04);}
.ni.breaking{border-left:3px solid var(--red);background:rgba(255,58,94,0.04);}
.ni.hi{border-left:3px solid var(--accent3);}
.ni.med{border-left:3px solid var(--yellow);}
.ni.lo{border-left:3px solid var(--dim);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.nmeta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px;}
.ntime{font-family:var(--mono);font-size:10px;color:var(--dim);}
.nsrc{font-family:var(--mono);font-size:10px;color:var(--accent);}
.ntag{padding:1px 6px;border-radius:2px;font-family:var(--mono);font-size:9px;font-weight:bold;letter-spacing:1px;}
.tag-usd{background:rgba(0,212,255,0.15);color:var(--accent)}
.tag-eur{background:rgba(0,255,157,0.15);color:var(--accent2)}
.tag-gbp{background:rgba(255,107,53,0.15);color:var(--accent3)}
.tag-jpy{background:rgba(255,215,0,0.15);color:var(--yellow)}
.tag-multi{background:rgba(150,100,200,0.15);color:#c07aff}
.tag-cad{background:rgba(255,80,80,0.15);color:#ff8080}
.tag-aud{background:rgba(80,180,255,0.15);color:#70c8ff}
.ibadge{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:2px;}
.ib-brk{background:rgba(255,58,94,0.2);color:var(--red);border:1px solid var(--red)}
.ib-hi{background:rgba(255,107,53,0.2);color:var(--accent3);border:1px solid var(--accent3)}
.ib-med{background:rgba(255,215,0,0.2);color:var(--yellow);border:1px solid var(--yellow)}
.ib-lo{background:rgba(74,106,128,0.2);color:var(--dim);border:1px solid var(--dim)}
.nhead{font-size:13px;color:var(--bright);line-height:1.5;font-weight:600;margin-bottom:4px;}
.ni.breaking .nhead{color:#ffb3c0;}
.nsum{font-size:11px;color:var(--dim);line-height:1.5;}

/* CALENDAR */
.crow{padding:12px 14px;border-bottom:1px solid rgba(13,33,53,0.5);}
.crow:active{background:rgba(0,212,255,0.04);}
.crow.upcoming{border-left:2px solid var(--accent);}
.crow.hi-row{border-left:2px solid var(--red);}
.ctop{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.ctime{font-family:var(--mono);font-size:10px;color:var(--dim);}
.cflag{font-size:14px;}
.cname{font-size:12px;color:var(--bright);font-weight:600;flex:1;min-width:100px;}
.idots{display:flex;gap:3px;}
.idot{width:7px;height:7px;border-radius:50%;}
.id-hi{background:var(--red)}.id-med{background:var(--yellow)}.id-lo{background:var(--dim)}
.cvals{display:flex;gap:14px;flex-wrap:wrap;}
.cval{text-align:center;}
.cvlbl{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:1px;margin-bottom:2px;}
.cvnum{font-family:var(--mono);font-size:12px;font-weight:bold;}
.va-pos{color:var(--green)}.va-neg{color:var(--red)}.vf{color:var(--accent)}.vp{color:var(--dim)}.vtbd{color:var(--dim)}

/* SIGNALS */
.scard{margin:12px 14px;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:14px;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.scard.buy::before{background:linear-gradient(90deg,var(--green),transparent)}
.scard.sell::before{background:linear-gradient(90deg,var(--red),transparent)}
.scard.neutral::before{background:linear-gradient(90deg,var(--yellow),transparent)}
.stop2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.spair{font-family:var(--mono);font-size:16px;color:var(--bright);font-weight:bold;}
.stf{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px;}
.sdir{font-family:var(--mono);font-size:18px;font-weight:900;letter-spacing:2px;}
.sd-buy{color:var(--green);text-shadow:0 0 10px var(--green)}
.sd-sell{color:var(--red);text-shadow:0 0 10px var(--red)}
.sd-neutral{color:var(--yellow);text-shadow:0 0 10px var(--yellow)}
.sbars{display:flex;gap:3px;margin:8px 0;}
.sbar{height:5px;flex:1;border-radius:3px;background:var(--border);}
.sbar.f.buy{background:var(--green)}.sbar.f.sell{background:var(--red)}.sbar.f.neutral{background:var(--yellow)}
.sgrid{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-family:var(--mono);font-size:10px;}
.slbl{color:var(--dim)}.sval{color:var(--bright)}

/* SESSIONS */
.sesscard{margin:12px 14px;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;padding:14px;display:flex;align-items:center;gap:14px;}
.sessind{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.sessopen{animation:blink 1s infinite;}
.sessinfo{flex:1;}
.sessname{font-size:15px;font-weight:600;}
.sesshrs{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px;}
.sessbadge{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:12px;}
.sb-open{background:rgba(0,255,157,0.15);color:var(--green);border:1px solid rgba(0,255,157,0.4)}
.sb-closed{background:rgba(30,50,70,0.3);color:var(--dim);border:1px solid var(--border)}

/* SENTIMENT */
.sentrow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(13,33,53,0.5);}
.sp2{font-family:var(--mono);font-size:12px;color:var(--bright);width:70px;}
.sbarwrap{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;display:flex;}
.sbull{height:100%;background:linear-gradient(90deg,var(--green),rgba(0,255,157,0.5));}
.sbear{height:100%;background:linear-gradient(-90deg,var(--red),rgba(255,58,94,0.5));}
.spct{font-family:var(--mono);font-size:10px;width:36px;text-align:right;}

/* ALERTS */
.alrow{display:flex;gap:12px;padding:13px 14px;border-bottom:1px solid rgba(13,33,53,0.5);align-items:flex-start;}
.alicon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.ai-danger{background:rgba(255,58,94,0.15);border:1px solid var(--red);color:var(--red)}
.ai-warn{background:rgba(255,215,0,0.15);border:1px solid var(--yellow);color:var(--yellow)}
.ai-info{background:rgba(0,212,255,0.15);border:1px solid var(--accent);color:var(--accent)}
.ai-success{background:rgba(0,255,157,0.15);border:1px solid var(--green);color:var(--green)}
.altxt{font-size:12px;color:var(--text);line-height:1.5;}
.altime{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:4px;}

/* TOAST */
.twrap{position:fixed;top:calc(88px + var(--safe-top));left:10px;right:10px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--panel2);border:1px solid var(--border2);border-left:3px solid var(--accent);padding:10px 14px;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.6);animation:fadeIn 0.3s ease;pointer-events:auto;}
.toast.t-danger{border-left-color:var(--red)}.toast.t-success{border-left-color:var(--green)}.toast.t-warn{border-left-color:var(--yellow)}
.ttitle{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:1px;margin-bottom:3px;}
.toast.t-danger .ttitle{color:var(--red)}.toast.t-success .ttitle{color:var(--green)}.toast.t-warn .ttitle{color:var(--yellow)}
.tmsg{font-size:11px;color:var(--bright);line-height:1.4;}

/* INSTALL BANNER */
.install-banner{display:none;position:fixed;bottom:calc(16px + var(--safe-bottom));left:14px;right:14px;background:var(--panel2);border:1px solid var(--accent);border-radius:8px;padding:14px;z-index:200;box-shadow:0 8px 32px rgba(0,212,255,0.2);}
.install-banner.show{display:flex;align-items:center;gap:12px;}
.install-txt{flex:1;font-size:12px;color:var(--bright);line-height:1.4;}
.install-txt strong{color:var(--accent);font-family:var(--mono);}
.install-btn{padding:8px 16px;background:var(--accent);color:#000;border:none;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:bold;cursor:pointer;white-space:nowrap;}
.install-close{color:var(--dim);font-size:18px;cursor:pointer;padding:4px;}

.loading{display:flex;align-items:center;justify-content:center;padding:30px;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:2px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">FX<span>TERM</span></div>
  <div class="live-dot" id="connDot"></div>

</div>

<!-- TICKER -->

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="showTab('quotes',this)">💹 QUOTES</button>

  <button class="nav-btn" onclick="showTab('sessions',this)">🕐 SESSIONS</button>
  <button class="nav-btn" onclick="showTab('alerts',this)">🔔 ALERTS</button>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="tab active" id="tab-quotes">
    <div class="sh"><div class="sh-dot"></div>LIVE MARKET QUOTES</div>
    <div id="qList"><div class="loading">CONNECTING TO TIINGO...</div></div>
  </div>

  <div class="tab" id="tab-news">
    <div class="filter-bar" id="fBar"></div>
    <div id="nList"><div class="loading">FETCHING NEWS...</div></div>
  </div>

  <div class="tab" id="tab-calendar">
    <div id="calList"><div class="loading">FETCHING CALENDAR...</div></div>
  </div>

  <div class="tab" id="tab-signals">
    <div class="sh"><div class="sh-dot" style="background:var(--accent3);box-shadow:0 0 6px var(--accent3)"></div>TECHNICAL SIGNALS</div>
    <div id="sigList"></div>
  </div>

  <div class="tab" id="tab-sentiment">
    <div class="sh"><div class="sh-dot" style="background:var(--yellow);box-shadow:0 0 6px var(--yellow)"></div>MARKET SENTIMENT</div>
    <div id="sentList"></div>
  </div>

  <div class="tab" id="tab-sessions">
    <div class="sh"><div class="sh-dot" style="background:#ffd700;box-shadow:0 0 6px #ffd700"></div>TRADING SESSIONS</div>

  </div>

  <div class="tab" id="tab-alerts">
    <div class="sh"><div class="sh-dot" style="background:var(--red);box-shadow:0 0 6px var(--red);animation:blink 0.8s infinite"></div>SMART ALERTS</div>
    <div id="alList"></div>
  </div>
</div>

<!-- INSTALL BANNER -->
<div class="install-banner" id="installBanner">
  <div class="install-txt"><strong>📱 Install FX Terminal</strong><br>Add to home screen for the full app experience</div>
  <button class="install-btn" id="installBtn">INSTALL</button>
  <span class="install-close" onclick="document.getElementById('installBanner').classList.remove('show')">✕</span>
</div>

<!-- TOASTS -->
<div class="twrap" id="twrap"></div>

<script>
// ── CONFIG ──

  {pair:'AUD/USD',tf:'H4',dir:'BUY',str:3,rsi:55.1,macd:'Mild Bullish',ma:'At 100 EMA',sup:'0.6480',res:'0.6560'},
  {pair:'XAU/USD',tf:'H1',dir:'BUY',str:5,rsi:61.4,macd:'Strong Bullish',ma:'Above All MAs',sup:'3000',res:'3080'},
  {pair:'USD/CAD',tf:'H4',dir:'NEUTRAL',str:2,rsi:49.8,macd:'Sideways',ma:'Between MAs',sup:'1.3640',res:'1.3740'},
];

var SENTIMENT=[
  {pair:'EUR/USD',bull:58},{pair:'GBP/USD',bull:45},{pair:'USD/JPY',bull:62},
  {pair:'AUD/USD',bull:55},{pair:'XAU/USD',bull:71},{pair:'USD/CAD',bull:40},
];

var SESSIONS=[
  {name:'Sydney',hrs:'22:00–07:00 UTC',s:22,e:7,col:'#00ff9d'},
  {name:'Tokyo',hrs:'00:00–09:00 UTC',s:0,e:9,col:'#ffd700'},
  {name:'London',hrs:'08:00–17:00 UTC',s:8,e:17,col:'#00d4ff'},
  {name:'New York',hrs:'13:00–22:00 UTC',s:13,e:22,col:'#ff6b35'},
];

var livePrices={}, prevPrices={}, newsData=[], nFilter='all';
var ws=null, wsTimer=null;

// ── HELPERS ──
function fp(p,pair){
  var n=parseFloat(p);
  if(isNaN(n)) return '—';
  if(pair==='USD/JPY'||pair==='EUR/JPY'||pair==='XAU/USD'||pair==='XAG/USD') return n.toFixed(2);
  return n.toFixed(4);
}
function sessActive(s,e,h){
  var day=new Date().getUTCDay();
  if(day===6) return false;
  if(day===0&&h<21) return false;
  return s<e?h>=s&&h<e:h>=s||h<e;
}
function utcNow(){
  var n=new Date();
  return String(n.getUTCHours()).padStart(2,'0')+':'+String(n.getUTCMinutes()).padStart(2,'0')+':'+String(n.getUTCSeconds()).padStart(2,'0');
}

// ── TIINGO WEBSOCKET ──
function connectWS(){
  ws = new WebSocket('wss://api.tiingo.com/fx');

  ws.onopen = function(){
    console.log('Tiingo connected');
    ws.send(JSON.stringify({
      eventName:'subscribe',
      authorization: TIINGO_KEY,
      eventData:{ thresholdLevel:5, tickers: PAIRS_META.map(function(m){return m.ticker;}) }
    }));
    setConnected(true);
    if(wsTimer){ clearTimeout(wsTimer); wsTimer=null; }
  };

  ws.onmessage = function(e){
    try{
      var msg = JSON.parse(e.data);
      if(msg.messageType==='A' && msg.data){
        var ticker  = msg.data[1];
        var mid     = msg.data[5];
        var pair    = TICKER_MAP[ticker];
        if(pair && mid){
          prevPrices[pair] = livePrices[pair] || mid;
          livePrices[pair] = mid;
          updateSinglePrice(pair);
          buildTicker();
        }
      }
    }catch(err){ console.error('WS parse error:',err); }
  };

  ws.onerror = function(){ setConnected(false); fetchRestPrices(); };

  ws.onclose = function(){
    setConnected(false);
    wsTimer = setTimeout(connectWS, 5000);
  };
}

function setConnected(ok){
  var dot   = document.getElementById('connDot');
  var badge = document.getElementById('connBadge');
  if(ok){
    dot.style.background='var(--green)';
    dot.style.boxShadow='0 0 8px var(--green)';
    badge.textContent='TIINGO · LIVE';
    badge.style.color='var(--green)';
    badge.style.borderColor='rgba(0,255,157,0.4)';
    badge.style.background='rgba(0,255,157,0.1)';
  } else {
    dot.style.background='var(--yellow)';
    dot.style.boxShadow='0 0 8px var(--yellow)';
    badge.textContent='RECONNECTING...';
    badge.style.color='var(--yellow)';
    badge.style.borderColor='rgba(255,215,0,0.4)';
    badge.style.background='rgba(255,215,0,0.1)';
  }
}

// ── REST FALLBACK (FCS API) ──
function fetchRestPrices(){
  var symbols = PAIRS_META.map(function(m){return m.pair;}).join(',');
  var url = 'https://fcsapi.com/api-v3/forex/latest?symbol='+encodeURIComponent(symbols)+'&access_key='+FCS_KEY;
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.response){
        prevPrices=Object.assign({},livePrices);
        data.response.forEach(function(item){
          if(item.s&&item.c) livePrices[item.s]=item.c;
        });
        renderQuotes();
        buildTicker();
        toast('💹 PRICES','Loaded via FCS REST API','info');
      }
    }).catch(function(e){ console.error('REST error:',e); });
}

// ── QUOTES ──
function renderQuotes(){
  var html='',lastCat='';
  PAIRS_META.forEach(function(m,i){
    if(m.cat!==lastCat){html+='<div class="cat-lbl">'+m.cat+'</div>';lastCat=m.cat;}
    var price=livePrices[m.pair], prev=prevPrices[m.pair];
    var isUp=price&&prev?parseFloat(price)>=parseFloat(prev):true;
    var pStr=price?fp(price,m.pair):'—';
    var diff=price&&prev?(parseFloat(price)-parseFloat(prev)):null;
    var dStr=diff!==null?((diff>=0?'+':'')+diff.toFixed(m.pair.includes('JPY')||m.pair.includes('XAU')?2:5)):'LIVE';
    html+='<div class="qrow" id="qr'+i+'"><div><div class="q-pair">'+m.pair+'</div><div class="q-sub">TIINGO LIVE</div></div>'
      +'<div><div class="q-price" id="qp'+i+'">'+pStr+'</div>'
      +'<div class="q-chg '+(isUp?'up':'down')+'">'+dStr+'</div></div></div>';
  });
  document.getElementById('qList').innerHTML=html;
}

function updateSinglePrice(pair){
  var idx=PAIRS_META.findIndex(function(m){return m.pair===pair;});
  if(idx===-1){renderQuotes();return;}
  var el=document.getElementById('qp'+idx);
  var row=document.getElementById('qr'+idx);
  if(!el){renderQuotes();return;}
  var newP=parseFloat(livePrices[pair]);
  var oldP=parseFloat(prevPrices[pair]||newP);
  var isUp=newP>=oldP;
  el.textContent=fp(newP,pair);
  if(row){
    row.className='qrow '+(isUp?'fu':'fd');
    setTimeout(function(){if(row)row.className='qrow';},700);
  }
}

function buildTicker(){
  var items=PAIRS_META.concat(PAIRS_META);
  document.getElementById('ticker').innerHTML=items.map(function(m){
    var p=livePrices[m.pair], prev=prevPrices[m.pair];
    var isUp=p&&prev?parseFloat(p)>=parseFloat(prev):true;
    return '<div class="t-item"><span class="t-pair">'+m.pair+'</span>'
      +'<span class="t-price">'+(p?fp(p,m.pair):'...')+'</span>'
      +'<span class="'+(isUp?'up':'down')+'">'+(isUp?'▲':'▼')+'</span></div>';
  }).join('');
}

function fetchNews(){
  var url='https://api.allorigins.win/get?url='+encodeURIComponent('https://forexfactory.com/news/rss');
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(json){
      var xml=json.contents||'';
      var items=[], matches=xml.matchAll(/<item>([\s\S]*?)<\/item>/g);
      for(var m of matches){
        var c=m[1];
        var title=((c.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/)||c.match(/<title>(.*?)<\/title>/)))||['',''];
        var desc=((c.match(/<description><!\[CDATA\[(.*?)\]\]><\/description>/)||c.match(/<description>(.*?)<\/description>/)))||['',''];
        var pub=(c.match(/<pubDate>(.*?)<\/pubDate>/))||['',''];
        var t=title[1]||'';
        if(t){
          var d=new Date(pub[1]);
          var tStr=isNaN(d.getTime())?'--:--':String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
          items.push({time:tStr,source:'FOREXFACTORY',title:t,desc:(desc[1]||'').replace(/<[^>]*>/g,'').slice(0,130),currency:detectCur(t),impact:detectImp(t)});
        }
        if(items.length>=15) break;
      }
      if(items.length>0){ newsData=items; renderNews(); }
    }).catch(function(){ loadFallbackNews(); });
}

function loadFallbackNews(){
  newsData=[
    {time:'--:--',source:'INFO',title:'News feed requires internet connection',desc:'Connect to WiFi or mobile data to load live ForexFactory news.',currency:'multi',impact:'low'},
  ];
  renderNews();
}

function detectCur(t){
  t=t.toLowerCase();
  if(t.includes('dollar')||t.includes('usd')||t.includes('fed ')||t.includes('federal reserve')||t.includes('nfp')) return 'usd';
  if(t.includes('euro')||t.includes('eur')||t.includes('ecb')) return 'eur';
  if(t.includes('pound')||t.includes('gbp')||t.includes('boe')||t.includes('sterling')) return 'gbp';
  if(t.includes('yen')||t.includes('jpy')||t.includes('boj')||t.includes('japan')) return 'jpy';
  if(t.includes('aussie')||t.includes('aud')||t.includes('rba')) return 'aud';
  if(t.includes('cad')||t.includes('canada')||t.includes('boc')) return 'cad';
  return 'multi';
}

function detectImp(t){
  t=t.toLowerCase();
  if(t.includes('breaking')||t.includes('urgent')) return 'breaking';
  if(t.includes('rate')||t.includes('gdp')||t.includes('inflation')||t.includes('tariff')||t.includes('nfp')||t.includes('cpi')) return 'high';
  if(t.includes('pmi')||t.includes('retail')||t.includes('trade')||t.includes('unemployment')) return 'medium';
  return 'low';
}

function renderNews(){
  var filtered=newsData.filter(function(n){
    if(nFilter==='all') return true;
    if(nFilter==='high') return n.impact==='high'||n.impact==='breaking';
    return n.currency===nFilter;
  });
  if(!filtered.length){document.getElementById('nList').innerHTML='<div class="loading">NO NEWS MATCHING FILTER</div>';return;}
  document.getElementById('nList').innerHTML=filtered.map(function(n){
    var ic=n.impact==='breaking'?'breaking':n.impact==='high'?'hi':n.impact==='medium'?'med':'lo';
    var ib=n.impact==='breaking'?'<span class="ibadge ib-brk">⚡ BREAKING</span>':
           n.impact==='high'?'<span class="ibadge ib-hi">🔴 HIGH</span>':
           n.impact==='medium'?'<span class="ibadge ib-med">🟡 MED</span>':
           '<span class="ibadge ib-lo">⚫ LOW</span>';
    return '<div class="ni '+ic+'"><div class="nmeta"><span class="ntime">🕐 '+n.time+'</span>'
      +'<span class="nsrc">'+n.source+'</span>'
      +'<span class="ntag tag-'+n.currency+'">'+n.currency.toUpperCase()+'</span>'+ib+'</div>'
      +'<div class="nhead">'+n.title+'</div>'
      +'<div class="nsum">'+n.desc+'</div></div>';
  }).join('');
}

// ── CALENDAR via FCS ──
function fetchCalendar(){
  var url='https://fcsapi.com/api-v3/forex/economy_cal?access_key='+FCS_KEY;
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.response||!data.response.length){
        document.getElementById('calList').innerHTML='<div class="loading">NO CALENDAR DATA</div>';
        return;
      }
      var html='<div class="sh"><div class="sh-dot"></div>ECONOMIC CALENDAR — FCS LIVE</div>';
      data.response.slice(0,20).forEach(function(ev){
        var imp=(ev.impact||'').toLowerCase();
        var rowCls='crow'+(ev.actual?'':' upcoming')+(imp==='high'?' hi-row':'');
        var dots=imp==='high'
          ?'<div class="idot id-hi"></div><div class="idot id-hi"></div><div class="idot id-hi"></div>'
          :imp==='medium'||imp==='moderate'
          ?'<div class="idot id-med"></div><div class="idot id-med"></div><div class="idot id-lo"></div>'
          :'<div class="idot id-lo"></div><div class="idot id-lo"></div><div class="idot id-lo"></div>';
        var actualCls=ev.actual?(parseFloat(ev.actual)>=parseFloat(ev.forecast||ev.actual)?'va-pos':'va-neg'):'vtbd';
        var timePart=ev.date?ev.date.split(' ')[1]||'—':'—';
        html+='<div class="'+rowCls+'"><div class="ctop"
          +'<span class="ctime">'+(ev.actual?'✅':'⏳')+' '+timePart.slice(0,5)+'</span>'
          +'<span class="cflag">'+getFlag(ev.country)+'</span>'
          +'<span class="cname">'+(ev.event||ev.name||'—')+'</span>'
          +'<div class="idots">'+dots+'</div></div>'
          +'<div class="cvals">
          +(ev.actual?'<div class="cval"><div class="cvlbl">ACTUAL</div><div class="cvnum '+actualCls+'">'+ev.actual+'</div></div>':'<div class="cval"><div class="cvlbl">ACTUAL</div><div class="cvnum vtbd">⏳ TBD</div></div>)
          +'<div class="cval"><div class="cvlbl">FORECAST</div><div class="cvnum vf">'+(ev.forecast||'—')+'</div></div>'
          +'<div class="cval"><div class="cvlbl">PREVIOUS</div><div class="cvnum vp">'+(ev.previous||'—')+'</div></div>'
          +'</div></div>';
      });
      document.getElementById('calList').innerHTML=html;
    }).catch(function(){
      document.getElementById('calList').innerHTML='<div class="loading">CALENDAR ERROR</div>';
    });
}

function getFlag(c){
  var f={'United States':'🇺🇸','Euro Zone':'🇪🇺','United Kingdom':'🇬🇧','Japan':'🇯🇵','Australia':'🇦🇺','Canada':'🇨🇦','New Zealand':'🇳🇿','Switzerland':'🇨🇭','China':'🇨🇳','Germany':'🇩🇪'};
  return f[c]||'🌐';
}

// ── TOAST ──
function toast(title,msg,type){
  var w=document.getElementById('twrap');
  var el=document.createElement('div');
  el.className='toast t-'+(type||'info');
  el.innerHTML='<div class="ttitle">'+title+'</div><div class="tmsg">'+msg+'</div>';
  w.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},300);},5000);
}
